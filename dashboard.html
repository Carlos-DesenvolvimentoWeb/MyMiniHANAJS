<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini-HANA Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid #3498db; width: 250px; }
        .card h3 { margin: 0; font-size: 0.9em; color: #bbb; }
        .card p { font-size: 1.8em; margin: 10px 0 0; font-weight: bold; }

    </style>
</head>
<body>
    <h1>📊 Mini-HANA Real-Time Analytics</h1>

    <div class="grid">
        <div class="card"><h3>Valor Total Estoque</h3><p id="totalValue">R$ 0,00</p></div>
        <div class="card"><h3>Itens Totais</h3><p id="totalQty">0</p></div>
        <div class="card"><h3>Ticket Médio</h3><p id="avgPrice">R$ 0,00</p></div>
        <div class="card"><h3>Produto Premium</h3><p id="mostExpensive" style="font-size: 1.2em;">-</p></div>
    </div>

    <script>
        // Função para carregar o Analytics
        async function loadAnalytics() {
            try {
                const res = await fetch('http://localhost:3000/api/inventory/analytics');
                if (!res.ok) throw new Error('Erro na rede');
                
                const data = await res.json();
                // console.log("Dados recebidos:", data);

                // Atualizando os campos
                document.getElementById('totalValue').innerText = `R$ ${parseFloat(data.summary.totalStockValue).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                document.getElementById('totalQty').innerText = data.summary.totalQuantity;
                document.getElementById('avgPrice').innerText = `R$ ${parseFloat(data.summary.averageItemPrice).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                document.getElementById('mostExpensive').innerText = data.insights.mostExpensiveProduct || "Nenhum";
                
            } catch (error) {
                console.error("Falha ao carregar analytics:", error);
            }
        }

        loadAnalytics();
        setInterval(loadAnalytics, 5000);
    </script>
</body>
</html>
